<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAM Web</title>
    <style>
        /* Menghilangkan margin bawaan browser dan membuat layar penuh */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Mencegah scrollbar ganda (dari parent dan iframe) */
            background-color: #f8fafc; /* Warna background cadangan saat loading */
        }

        /* Membuat iframe penuh satu layar */
        .app-iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <!-- Iframe yang mengarah ke link Google Apps Script Anda -->
    <iframe 
        class="app-iframe" 
        src="https://script.google.com/macros/s/AKfycby2rUXrnZgFws9Rv0P06B3NsRsXafbXpm45dsftPQ8dqQLdxEggtbX8rgZQt-lMb_8MPw/exec" 
        allow="camera; microphone; fullscreen; display-capture; geolocation"
        allowfullscreen>
    </iframe>

</body>
</html>
